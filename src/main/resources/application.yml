spring:
  application:
    name: smartlog
  datasource:
    url: jdbc:postgresql://localhost:5432/smartlog
    username: smartlog
    password: smartlog
  flyway:
    locations: classpath:db/migration/postgresql
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: smartlog-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
    prometheus:
      enabled: true
  metrics:
    tags:
      application: smartlog
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

smartlog:
  ingestion:
    mode: kafka
    validation:
      max-payload-bytes: 262144
      max-stack-trace-chars: 12000
    rate-limit:
      enabled: false
      default-limit-per-window: 1000
      window: 1m
    pipeline:
      queue-capacity: 1000
      batch-size: 100
      worker-threads: 2
      poll-timeout: 200ms
      shutdown-timeout: 10s
  kafka:
    publish-timeout: 5s
    topics:
      raw: logs.raw
      enriched: logs.enriched
      dead-letter: logs.dead-letter
      alerts-created: alerts.created
  alerting:
    error-threshold: 100
    window: 5m
  ai:
    llm-client: mock
