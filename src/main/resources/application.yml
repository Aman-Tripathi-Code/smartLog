spring:
  application:
    name: smartlog
  datasource:
    url: jdbc:postgresql://localhost:5432/smartlog
    username: smartlog
    password: smartlog
  flyway:
    locations: classpath:db/migration/postgresql

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

smartlog:
  ingestion:
    pipeline:
      queue-capacity: 1000
      batch-size: 100
      worker-threads: 2
      poll-timeout: 200ms
      shutdown-timeout: 10s
