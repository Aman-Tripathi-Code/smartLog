spring:
  application:
    name: smartlog
  datasource:
    url: jdbc:postgresql://localhost:5432/smartlog
    username: smartlog
    password: smartlog
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-postgres.sql

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
